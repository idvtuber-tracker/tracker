name: Test Notifications

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Exit with code 1
        run: exit 1

      - name: Send Discord notification on specific error
        if: failure()
        run: |
          # Check if the specific error exists in the logs
          if grep -q "Error: Process completed with exit code 1" <<< "${{ job.status }}"; then
            curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
              -H 'Content-Type: application/json' \
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "@here Workflow failed with exit code 1!",
              "embeds": [{
                "title": "❌ Workflow Failed",
                "color": 16711680
              }]
            }'
