name: Test — Discord Exit Code 1 Notification

# Manual trigger only — this workflow deliberately fails to verify
# that the Discord error notification fires correctly.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_exit_code_1:
    runs-on: ubuntu-latest

    steps:
      - name: Simulate tracker exit code 1
        id: run_tracker
        shell: bash
        run: |
          echo "Simulating tracker.py crash..."
          echo "ERROR: Process completed with exit code 1"
          exit 1

      # This step must NOT run — confirms that a real crash skips the restart.
      - name: Restart workflow (skipped on failure)
        id: restart
        if: always() && steps.run_tracker.outcome == 'success'
        shell: bash
        run: |
          echo "This should not run during the test."

      # ── Discord: error notification ───────────────────────────────────────────
      # Condition mirrors tracker.yml exactly.
      - name: Notify Discord — tracker error
        if: steps.run_tracker.outcome == 'failure'
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"content\": \"@here\",
              \"embeds\": [{
                \"title\": \"❌ Tracker crashed — exit code 1\",
                \"description\": \"\`tracker.py\` exited with a non-zero code. The 6-hour cycle was interrupted and data collection has stopped until the workflow restarts.\",
                \"color\": 15548997,
                \"fields\": [
                  { \"name\": \"Run\", \"value\": \"[${RUN_ID}](${RUN_URL})\", \"inline\": true },
                  { \"name\": \"Repository\", \"value\": \"${REPO}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"IDVTuber Tracker — TEST\" }
              }]
            }"
          echo "Discord test notification sent."

      # ── Confirm restart notification does NOT fire ────────────────────────────
      # This step should be skipped because run_tracker failed.
      - name: Notify Discord — cycle complete, restarting (should be skipped)
        if: steps.run_tracker.outcome == 'success' && steps.restart.outcome == 'success'
        shell: bash
        run: |
          echo "ERROR: This step should not have run. Condition logic is broken."
          exit 1
