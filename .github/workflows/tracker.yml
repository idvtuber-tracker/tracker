name: YouTube Livestream Tracker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard/**'
      - 'db_backup/**'
      - 'analytics.csv'

permissions:
  contents: write

jobs:
  track:
    runs-on: self-hosted

    env:
      YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_API_KEYS:     ${{ secrets.YOUTUBE_API_KEYS }}
      CHANNEL_IDS:          ${{ secrets.CHANNEL_IDS }}
      AIVEN_DATABASE_URL:   ${{ secrets.AIVEN_DATABASE_URL }}
      GH_PAT:               ${{ secrets.GH_PAT }}
      GITHUB_REPOSITORY:    ${{ github.repository }}
      CSV_OUTPUT_PATH:      analytics.csv
      DASHBOARD_OUTPUT_DIR: dashboard
      POLL_INTERVAL_SEC:    "900"
      DEPLOY_INTERVAL_SEC:  "900"   # deploy to Pages every 15 minutes
      STREAM_POLL_SEC:      "60"
      MAX_HISTORY_POINTS:   "60"
      PYTHONUTF8:           "1"
      PYTHONIOENCODING:     "utf-8"

    steps:
      - name: Cancel queued duplicate runs
        shell: powershell
        run: |
          $pat     = "${{ secrets.GH_PAT }}"
          $repo    = "${{ github.repository }}"
          $current = "${{ github.run_id }}"
          $headers = @{
            "Authorization"        = "Bearer $pat"
            "Accept"               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $url  = "https://api.github.com/repos/$repo/actions/workflows/tracker.yml/runs?status=queued&per_page=100"
          $runs = (Invoke-RestMethod -Uri $url -Headers $headers).workflow_runs
          foreach ($run in $runs) {
            if ($run.id -ne [int64]$current) {
              $cancelUrl = "https://api.github.com/repos/$repo/actions/runs/$($run.id)/cancel"
              Invoke-RestMethod -Uri $cancelUrl -Method POST -Headers $headers
              Write-Host "Cancelled queued run $($run.id)"
            }
          }
          Write-Host "Done cancelling duplicates."

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: idvtuber-tracker/tracker
          token: ${{ secrets.GH_PAT }}

      - name: Force git remote URL with PAT
        shell: powershell
        run: |
          $pat  = "${{ secrets.GH_PAT }}"
          $repo = "${{ github.repository }}"
          git remote set-url origin "https://x-access-token:$($pat)@github.com/$repo.git"
          git config --global credential.helper store
          $line = "https://x-access-token:$($pat)@github.com"
          Set-Content -Path "$env:USERPROFILE\.git-credentials" -Value $line -Encoding UTF8
          Write-Host "Remote URL and credentials set."

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: powershell
        run: pip install -r requirements.txt

      # id is required so the Discord steps below can inspect this step's outcome.
      - name: Run tracker
        id: run_tracker
        shell: powershell
        run: python tracker.py

      - name: Clean up old workflow runs
        if: always()
        shell: powershell
        run: |
          $pat     = "${{ secrets.GH_PAT }}"
          $repo    = "${{ github.repository }}"
          $headers = @{
            "Authorization"        = "Bearer $pat"
            "Accept"               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $runsUrl  = "https://api.github.com/repos/$repo/actions/workflows/tracker.yml/runs?per_page=100"
          $runs     = (Invoke-RestMethod -Uri $runsUrl -Headers $headers).workflow_runs
          $toDelete = $runs | Where-Object { $_.status -eq "completed" } | Select-Object -Skip 5
          foreach ($run in $toDelete) {
            $deleteUrl = "https://api.github.com/repos/$repo/actions/runs/$($run.id)"
            Invoke-RestMethod -Uri $deleteUrl -Method DELETE -Headers $headers
            Write-Host "Deleted run $($run.id)"
          }
          Write-Host "Cleanup complete."

      # id is required so the Discord step below can inspect this step's outcome.
      - name: Restart workflow
        id: restart
        if: always()
        shell: powershell
        run: |
          $pat     = "${{ secrets.GH_PAT }}"
          $repo    = "${{ github.repository }}"
          $headers = @{
            "Authorization"        = "Bearer $pat"
            "Accept"               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = @{ ref = "main" } | ConvertTo-Json
          $url  = "https://api.github.com/repos/$repo/actions/workflows/tracker.yml/dispatches"
          Invoke-RestMethod -Uri $url -Method POST -Headers $headers -Body $body -ContentType "application/json"
          Write-Host "New workflow run triggered."

      # ── Discord: error notification ───────────────────────────────────────────
      # Fires when "Run tracker" exits with a non-zero code (exit code 1).
      # steps.run_tracker.outcome == 'failure' is the correct way to detect this —
      # it is set by GitHub Actions when the step's process exits non-zero.
      # The old bash/grep approach did not work on a Windows runner and was checking
      # job.status (which only holds "failure"/"success"), not the actual log text.
      - name: Notify Discord — tracker error
        if: steps.run_tracker.outcome == 'failure'
        shell: powershell
        run: |
          $repo   = "${{ github.repository }}"
          $runId  = "${{ github.run_id }}"
          $runUrl = "https://github.com/$repo/actions/runs/$runId"
          $body   = [ordered]@{
            content = "@here"
            embeds  = @(
              [ordered]@{
                title       = "❌ Tracker crashed — exit code 1"
                description = "``tracker.py`` exited with a non-zero code. The 6-hour cycle was interrupted and data collection has stopped until the workflow restarts."
                color       = 15548997   # red (#ED4245)
                fields      = @(
                  [ordered]@{ name = "Run"; value = "[$runId]($runUrl)"; inline = $true }
                  [ordered]@{ name = "Repository"; value = $repo; inline = $true }
                )
                footer      = [ordered]@{ text = "IDVTuber Tracker" }
              }
            )
          } | ConvertTo-Json -Depth 10
          Invoke-RestMethod `
            -Uri         "${{ secrets.DISCORD_WEBHOOK }}" `
            -Method      POST `
            -Body        $body `
            -ContentType "application/json"
          Write-Host "Discord error notification sent."

      # ── Discord: successful restart notification ──────────────────────────────
      # Fires when the 6-hour cycle completed normally AND the "Restart workflow"
      # step succeeded (a new cycle was dispatched). Both conditions must be true:
      #   - steps.run_tracker.outcome == 'success'  → tracker ran its full 6h
      #   - steps.restart.outcome     == 'success'  → new cycle was triggered
      - name: Notify Discord — cycle complete, restarting
        if: steps.run_tracker.outcome == 'success' && steps.restart.outcome == 'success'
        shell: powershell
        run: |
          $repo      = "${{ github.repository }}"
          $runId     = "${{ github.run_id }}"
          $runUrl    = "https://github.com/$repo/actions/runs/$runId"
          $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm") + " UTC"
          $body      = [ordered]@{
            content = "@here"
            embeds  = @(
              [ordered]@{
                title       = "✅ 6-hour cycle complete — new cycle started"
                description = "``tracker.py`` completed its 6-hour run successfully. A new workflow cycle has been dispatched and data collection continues."
                color       = 5763719   # green (#57F287)
                fields      = @(
                  [ordered]@{ name = "Completed run"; value = "[$runId]($runUrl)"; inline = $true }
                  [ordered]@{ name = "Timestamp"; value = $timestamp; inline = $true }
                )
                footer      = [ordered]@{ text = "IDVTuber Tracker" }
              }
            )
          } | ConvertTo-Json -Depth 10
          Invoke-RestMethod `
            -Uri         "${{ secrets.DISCORD_WEBHOOK }}" `
            -Method      POST `
            -Body        $body `
            -ContentType "application/json"
          Write-Host "Discord restart notification sent."
